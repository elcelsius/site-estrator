name: Testes

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Obter o código
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r requirements-llm.txt

      - name: Verificar segredos
        run: detect-secrets-hook $(git ls-files)

      - name: Auditar dependências
        run: pip-audit --local --progress-spinner off --cache-dir .audit-cache

      - name: Verificar estilo
        run: |
          ruff check .
          ruff format --check .

      - name: Executar testes
        run: python -m unittest discover -s tests -v
